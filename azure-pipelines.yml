name: sql-validation-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - azure-pipelines.yml
      - pipelines/**
      - scripts/**
      - tools/**
      - docs/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - azure-pipelines.yml
      - pipelines/**
      - scripts/**
      - tools/**
      - docs/**

pool:
  name: Shamvil-pool
  demands:
    - Agent.Name -equals shamvil
    - Agent.OS -equals Windows_NT

variables:
  SqlEncrypt: 'true'
  SqlTrustServerCertificate: 'false'

stages:
  - stage: Validate
    displayName: Validate SQL scripts
    jobs:
      - job: ValidateSqlScripts
        displayName: Dry-run script discovery and artifacts
        steps:
          - checkout: self

          - template: /pipelines/templates/run-sql-scripts.yml
            parameters:
              targetDatabases: ValidationDatabase
              dryRun: true
              continueOnError: false
              artifactName: sql-validation-evidence
              artifactRoot: '$(Build.ArtifactStagingDirectory)\sql-validation'
              requireSqlServer: false
